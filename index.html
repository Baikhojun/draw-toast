<!DOCTYPE html>
<!-- 이 파일의 역할: Draw Toast 게임의 메인 진입점 (구조만 정의, 로직은 js/*.js) -->
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🍞 Draw Toast — 머릿속 토스트 꺼내보기</title>
  <meta name="author" content="WhiteJune" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 시작 화면 (오버레이) -->
  <div id="start-screen" class="overlay">
    <div class="start-card">
      <h1>🍞 Draw Toast</h1>
      <p class="subtitle">"토스트 만드는 법"을 카드로 꺼내보세요</p>
      <p class="tagline">같은 단어, 다른 생각 — 그걸 눈으로 확인해봅시다.</p>
      <label class="nickname-label">
        <span>닉네임</span>
        <input type="text" id="nickname-input" placeholder="예: 백호준" maxlength="12" />
      </label>
      <label class="timer-label">
        <span>타이머</span>
        <select id="timer-select">
          <option value="0">없음</option>
          <option value="60">1분</option>
          <option value="180" selected>3분</option>
          <option value="300">5분</option>
        </select>
      </label>
      <button id="start-btn" class="primary-btn">시작하기 →</button>
      <p class="footer-credit">by <strong>WhiteJune</strong></p>
    </div>
  </div>

  <!-- 메인 게임 화면 -->
  <header class="topbar">
    <div class="topbar-left">
      <span class="logo">🍞 Draw Toast</span>
      <span class="player-name" id="player-name-display"></span>
    </div>
    <div class="topbar-center">
      <button id="connect-mode-btn" class="mode-btn">🔗 연결모드</button>
      <button id="clear-btn" class="ghost-btn">🗑 캔버스 비우기</button>
    </div>
    <div class="topbar-right">
      <button id="finish-btn" class="primary-btn">✅ 완성!</button>
    </div>
  </header>

  <main class="layout">
    <!-- 좌측: 카드 팔레트 -->
    <aside class="palette" aria-label="카드 팔레트">
      <div class="palette-tabs" id="palette-tabs"></div>
      <div class="palette-grid" id="palette-grid"></div>
      <p class="palette-hint">카드를 클릭하면 캔버스에 추가됩니다.</p>
    </aside>

    <!-- 중앙: 캔버스 -->
    <section class="canvas-wrap" aria-label="작업 캔버스">
      <svg id="canvas" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5"
                  markerWidth="8" markerHeight="8" orient="auto-start-reverse">
            <path d="M0,0 L10,5 L0,10 Z" fill="#8b5e34" />
          </marker>
        </defs>
        <g id="arrows-layer"></g>
        <g id="cards-layer"></g>
      </svg>
      <div class="canvas-empty-hint" id="canvas-empty-hint">
        <p>👈 왼쪽 팔레트에서 카드를 클릭해 시작하세요</p>
        <p class="small">두 카드를 화살표로 연결하려면 위쪽 <b>🔗 연결모드</b>를 켜세요.</p>
      </div>
    </section>

    <!-- 우측: 사이드바 -->
    <aside class="sidebar" aria-label="도구">
      <div class="sidebar-block timer-block">
        <h3>⏱ 타이머</h3>
        <div id="timer-display" class="timer-display">--:--</div>
        <div class="timer-controls">
          <button id="timer-toggle" class="ghost-btn">시작</button>
          <button id="timer-reset" class="ghost-btn">리셋</button>
        </div>
      </div>

      <div class="sidebar-block">
        <h3>📌 현재 작품</h3>
        <p class="stat-line">카드 <b id="stat-cards">0</b>장 · 연결 <b id="stat-arrows">0</b>개</p>
      </div>

      <div class="sidebar-block">
        <h3>🎯 액션</h3>
        <button id="save-png-btn" class="ghost-btn full">💾 PNG 다운로드</button>
        <button id="gallery-btn" class="ghost-btn full">🖼 갤러리 열기 (<span id="gallery-count">0</span>)</button>
      </div>

      <div class="sidebar-block credit-block">
        <p class="credit-text">made by <strong>WhiteJune</strong></p>
      </div>
    </aside>
  </main>

  <!-- 완성 모달 -->
  <div id="finish-modal" class="overlay hidden">
    <div class="modal-card">
      <h2>🎉 완성!</h2>
      <p id="finish-message">멋진 토스트가 완성됐어요.</p>
      <div class="modal-actions">
        <button id="finish-download" class="primary-btn">💾 내 그림 PNG로 받기</button>
        <button id="finish-gallery" class="ghost-btn">🖼 갤러리로 가기</button>
        <button id="finish-continue" class="ghost-btn">계속 수정</button>
      </div>
    </div>
  </div>

  <!-- 갤러리 모달 -->
  <div id="gallery-modal" class="overlay hidden">
    <div class="modal-card gallery-card">
      <header class="gallery-header">
        <h2>🖼 갤러리 — 같은 토스트, 이렇게 다른 생각!</h2>
        <button id="gallery-close" class="ghost-btn">닫기</button>
      </header>
      <div class="gallery-controls">
        <button id="gallery-mode-grid" class="ghost-btn active">격자 보기</button>
        <button id="gallery-mode-compare" class="ghost-btn">두 작품 비교</button>
        <button id="gallery-export-all" class="ghost-btn">📦 전체 PNG로 받기</button>
        <button id="gallery-clear" class="ghost-btn danger">⚠ 전체 삭제</button>
      </div>
      <div id="gallery-content" class="gallery-content"></div>
    </div>
  </div>

  <!-- 토스트 알림 -->
  <div id="toast-notification" class="toast hidden"></div>

  <!-- 스크립트 (의존 순서) -->
  <script src="js/cards-data.js"></script>
  <script src="js/palette.js"></script>
  <script src="js/canvas.js"></script>
  <script src="js/arrows.js"></script>
  <script src="js/labels.js"></script>
  <script src="js/timer.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/gallery.js"></script>
  <script src="js/export.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
